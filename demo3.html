<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div
        {
            border: 20px groove black;
            height: 400px;
            width:400px ;
            text-align: center;
            line-height: 400px;
            border-radius: 10%;
            font-size: 50px;
            margin: 100px auto;
            font-family: impact;
            text-transform: uppercase;
            
        }
        div:hover{
            /*box-shadow:  10px 10px 1px blue , -10px -10px 1px green;*/
            box-shadow: 5px 5px 5px 10px black inset, 0px 0px 1px 15px blue;
            transition: all 2s;
        }
    </style>
</head>
<body>
    <div> Code Helper</div>
</body>
</html>
