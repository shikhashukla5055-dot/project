<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #outer{
            background-color: black;
            height: 500px;
            width: 1000px;
        }
        #techpile{
            height: 50px;
            width: 1000px;
            background-color: red;
        }
        .techpileleft{
            height: 50px;
            width: 200px;
            background-color: white;
            float: left;
        }
        .techpilemiddle{
            height: 50px;
            width: 600px;
            background-color: grey;
            float: left;
            font-size: 25PX;
            font-weight: bold;
            text-align: center;
            line-height: 50px;
        }
        .main
        {
            height: 450px;
            border: 2px solid black;
            background-color: red;
            width: 1000px;
        }
        .left{
            background-color: yellow;
            height: 450px;
            float: left;
            width: 400px;
        }
        .leftborder{
            border: 1px solid black;
            height: 450px;
            width: 25px;
            float: left;
            background-color: grey;
        }
        .middle{
            background-color: blue;
            height: 450px;
            width: 200px;
            float: left;
        }
        .middleleft{
            height: 450px;
            width: 65px;
            border: 1px solid black;
            float: left;
            background-color: grey;
        }
        .middlemiddle{
            background-color: red;
            height: 450px;
            width: 65px;
            border: 1px solid black;
            float: left;

        }
        .box{
            height: 50px;
            border-bottom: 1px solid black;
        }
        .walls{
            border-bottom: 1px solid black;
            height: 25px;
            width:400px;
            background-color: grey;
        }
        .smallred{
            background-color: red;
        }
        .red{
            background-color: red;
            height: 50px;
            width: 400px;
            font-size: 40px;
            text-align: center;
            line-height: 50px;
    
        }
        .rightborder{
            border: 1px solid black;
            height: 450px;
            width: 25px;
            float: right;
            background-color: grey;

        }
        .blue{
            background-color: blue;
            border: 1px solid black;
            height: 100px;

        }
        .redblue{
            background-color: red;
            height: 100px;
            width: 150px;
        }
    </style>
</head>
<body>
    <div id="outer">
        <div id="techpile">
            <div class="techpileleft"></div>
            <div class="techpilemiddle">TECHPILE TECHNOLOGY PVT.LTD</div>
            <div class="techpileleft"></div>
        </div>
        <div class="main">
            <div class="left">
                <div class="leftborder"></div>
                <div class="walls"></div>
                <div class="walls smallred"></div>
                <div class="walls"></div>
                <div class="walls red"></div>
                <div class="walls blue">
                    <div class="redblue"></div>
                </div>
                <div class="walls blue">
                    <div class="redblue"></div>

                </div>
                <div class="walls"></div>
                <div style="height: 92px;" class="walls red">Techpile Gate</div>
            </div>
            <div class="middle">
                <div class="middleleft">
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>

                </div>
                <div class="middlemiddle">
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                </div>
                <div class="middleleft">
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>

                </div>

            </div>
            <div class="left">
                <div class="rightborder"></div>
                <div class="walls"></div>
                <div class="walls smallred"></div>
                <div class="walls"></div>
                <div class="walls red"></div>
                <div class="walls blue">
                    <div style="float: right;" class="redblue"></div>
                </div>
                <div class="walls blue">
                    <div style="float: right;" class="redblue"></div>

                </div>
                <div class="walls"></div>
                <div style="height: 92px;" class="walls red">Techpile Gate</div>

            </div>
        </div>
    </div>
</body>
</html>
