<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #outer{
             min-height: 300px;
             width: 900px; 
             border: 2px solid red;
             background-color: gray;
             border: none;
             border-radius: 5px;
             padding: 5px;
            box-sizing: border-box;

        }
        .row{
            height: 60px;
            width: 990px;
            
        }
        .col1{
            height: 50px;
            width: 50px;
            border: 2px solid black;
            float: left;
            margin: 3px;
            font-size: 20px;
            text-align: center;
            line-height: 50px;
            border-radius: 5px;
            background-color: white;
        }

    </style>
</head>
<body>
    <div id="outer">
        <div class="row">
            <div class="col1">~</div>
            <div class="col1">1</div>
            <div class="col1">2</div>
            <div class="col1">3</div>
            <div class="col1">4</div>
            <div class="col1">5</div>
            <div class="col1">6</div>
            <div class="col1">7</div>
            <div class="col1">8</div>
            <div class="col1">9</div>
            <div class="col1">0</div>
            <div class="col1">-</div>
            <div class="col1">+</div>
            <div style="width: 100px;" class="col1">Delete</div>
        </div>
        <div class="row">
            <div style="width: 75px;" class="col1">Tab</div>
            <div class="col1">Q</div>
            <div class="col1">W</div>
            <div class="col1">E</div>
            <div class="col1">R</div>
            <div class="col1">T</div>
            <div class="col1">Y</div>
            <div class="col1">U</div>
            <div class="col1">I</div>
            <div class="col1">O</div>
            <div class="col1">P</div>
            <div class="col1">[</div>
            <div class="col1">]</div>
            <div style="width: 75px;" class="col1">\</div>

        </div>
        <div class="row">
            <div style="width: 100px;" class="col1">CapsLock</div>
            <div class="col1">A</div>
            <div class="col1">S</div>
            <div class="col1">D</div>
            <div class="col1">F</div>
            <div class="col1">G</div>
            <div class="col1">H</div>
            <div class="col1">J</div>
            <div class="col1">K</div>
            <div class="col1">L</div>
            <div class="col1">;</div>
            <div class="col1">'</div>
            <div class="col1">]</div>
            <div style="width: 50px;" class="col1">Return</div>
            
        </div>
        <div class="row">
                        <div style="width: 132px;" class="col1">CapsLock</div>
            <div class="col1">Z</div>
            <div class="col1">X</div>
            <div class="col1">C</div>
            <div class="col1">V</div>
            <div class="col1">B</div>
            <div class="col1">N</div>
            <div class="col1">M</div>
            <div class="col1">.</div>
            <div class="col1">.</div>
            <div class="col1">/</div>
            <div style="width: 135px;" class="col1">Shift</div>
        </div>
        <div class="row">
            <div style="width: 75px;" class="col1">Ctrl</div>
            <div class="col1">Alt</div>
            <div style="width: 100px;" class="col1">Command</div>
            <div style="width: 330px;" class="col1">Space</div>
            
            <div style="width: 100px;" class="col1">command</div>
            <div class="col1">Alt</div>
            <div class="col1">Ctrl</div>
            <div class="col1">Fn</div>
            
        </div>
    </div>
</body>
</html>
